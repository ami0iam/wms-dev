<!-- ================================================================
  WMS 종목 페이지 (농구) — 아임웹 코드 위젯
  사용법:
  1. 아임웹 종목 카테고리 페이지 편집
  2. 상단에 코드 위젯 추가 → 이 코드 전체 붙여넣기
  3. 메뉴/카테고리 섹션, 쇼핑 기획전 섹션은 그대로 유지
  4. 종목 변경 시: data-sport, SPORT_NAME, SPORT_TAGLINE, BACKDROP_WORD 수정
================================================================ -->

<style>
/* ── WMS 종목 히어로 ── */
#wms-cat-hero {
  position: relative;
  overflow: hidden;
  padding: 100px 0 64px;
  background:
    radial-gradient(ellipse 60% 70% at 5% 55%, rgba(122,26,46,.28) 0%, transparent 55%),
    radial-gradient(ellipse 45% 50% at 92% 20%, rgba(60,6,18,.3) 0%, transparent 50%),
    #080808;
}
#wms-cat-hero::before {
  content: '';
  position: absolute; inset: 0;
  opacity: .018;
  background-image:
    linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 120px 120px;
  pointer-events: none;
}
/* 배경 대형 종목 타이포 */
.wms-cat-backdrop {
  position: absolute;
  right: -10px; top: 50%; transform: translateY(-50%);
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: clamp(100px, 15vw, 180px);
  line-height: .85; letter-spacing: .02em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(255,255,255,.04);
  user-select: none; pointer-events: none;
}
.wms-cat-inner {
  position: relative; z-index: 1;
  max-width: 1080px; margin: 0 auto;
  padding: 0 48px;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; flex-wrap: wrap;
}
.wms-cat-eyebrow {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(255,255,255,.25); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
  font-family: 'Pretendard', sans-serif;
}
.wms-cat-eyebrow::before {
  content: ''; display: block; width: 18px; height: .5px; background: #c4284a;
}
.wms-cat-h {
  font-family: 'Bebas Neue', 'Impact', sans-serif;
  font-size: clamp(64px, 10vw, 96px);
  line-height: .88; color: #fff; letter-spacing: .02em;
  margin-bottom: 12px;
}
.wms-cat-tagline {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(14px, 1.8vw, 18px);
  color: rgba(196,40,74,.85); line-height: 1.4;
  max-width: 280px; text-align: right;
}

/* ── 레벨 여정 ── */
#wms-cat-journey {
  background: #080808;
  padding: 48px 0 56px;
  border-bottom: .5px solid rgba(255,255,255,.08);
}
.wms-journey-inner {
  max-width: 1080px; margin: 0 auto; padding: 0 48px;
}
.wms-journey-lbl {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-bottom: 22px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Pretendard', sans-serif;
}
.wms-journey-lbl::before {
  content: ''; display: block; width: 14px; height: .5px; background: rgba(196,40,74,.5);
}
.wms-steps {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  position: relative;
  margin-bottom: 20px;
}
.wms-steps::before {
  content: '';
  position: absolute; top: 19px; left: 10%; right: 10%; height: .5px;
  background: linear-gradient(to right, rgba(196,40,74,.5), rgba(196,40,74,.1));
  z-index: 0;
}
.wms-step {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; position: relative; z-index: 1; cursor: pointer;
  padding: 4px 0;
}
.wms-step-dot {
  width: 38px; height: 38px; border-radius: 50%;
  background: #111; border: .5px solid rgba(196,40,74,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: rgba(196,40,74,.5);
  transition: all .2s; font-family: 'Pretendard', sans-serif;
}
.wms-step:hover .wms-step-dot,
.wms-step.on .wms-step-dot {
  background: rgba(196,40,74,.18); border-color: rgba(196,40,74,.6); color: #fff;
}
.wms-step-name {
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,.4);
  text-align: center; transition: color .2s;
  font-family: 'Pretendard', sans-serif; line-height: 1.3;
}
.wms-step:hover .wms-step-name,
.wms-step.on .wms-step-name { color: rgba(255,255,255,.9); }
.wms-step-sub {
  font-size: 9px; color: rgba(255,255,255,.22);
  text-align: center; font-family: 'Pretendard', sans-serif;
}

.wms-step-detail {
  background: #111; border: .5px solid rgba(196,40,74,.22);
  border-radius: 12px; padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: opacity .3s;
}
.wms-step-badge {
  font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  background: rgba(196,40,74,.12); color: rgba(196,40,74,.8);
  border: .5px solid rgba(196,40,74,.25); border-radius: 10px;
  padding: 4px 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  font-family: 'Pretendard', sans-serif;
}
.wms-step-detail-name {
  font-size: 13px; font-weight: 500; color: #fff; margin-bottom: 4px;
  font-family: 'Pretendard', sans-serif;
}
.wms-step-detail-desc {
  font-size: 12px; color: rgba(255,255,255,.38); line-height: 1.65;
  font-family: 'Pretendard', sans-serif;
}

/* ── 클래스 목록 헤더 ── */
#wms-cat-list-header {
  background: #111;
  padding: 32px 0 20px;
  border-bottom: .5px solid rgba(255,255,255,.07);
}
.wms-list-inner {
  max-width: 1080px; margin: 0 auto; padding: 0 48px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.wms-list-h {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: clamp(20px, 2.8vw, 26px); color: #fff;
}
.wms-sort { display: flex; gap: 6px; }
.wms-sort-btn {
  font-size: 11px; padding: 5px 13px; border-radius: 10px;
  border: .5px solid rgba(255,255,255,.1);
  background: transparent; color: rgba(255,255,255,.3);
  cursor: pointer; font-family: 'Pretendard', sans-serif;
  transition: all .2s;
}
.wms-sort-btn:hover { border-color: rgba(196,40,74,.4); color: rgba(196,40,74,.8); }
.wms-sort-btn.on {
  background: rgba(196,40,74,.12); border-color: rgba(196,40,74,.45);
  color: rgba(196,40,74,.9);
}

/* 아임웹 충돌 방지 */
#wms-cat-hero *, #wms-cat-journey *, #wms-cat-list-header * {
  box-sizing: border-box; margin: 0; padding: 0;
}
#wms-cat-hero, #wms-cat-journey, #wms-cat-list-header {
  border: none !important; outline: none !important;
}

/* 모바일 */
@media (max-width: 768px) {
  .wms-cat-inner { padding: 0 24px; flex-direction: column; align-items: flex-start; }
  .wms-cat-tagline { text-align: left; }
  .wms-cat-backdrop { font-size: clamp(72px, 22vw, 100px); right: -5px; }
  #wms-cat-hero { padding: 80px 0 48px; }
  .wms-journey-inner { padding: 0 24px; }
  .wms-steps { grid-template-columns: repeat(3, 1fr); }
  .wms-steps::before { left: 15%; right: 15%; }
  .wms-list-inner { padding: 0 24px; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .wms-steps { grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .wms-step-sub { display: none; }
}
</style>

<!-- ══ 종목 히어로 ══ -->
<section id="wms-cat-hero">
  <div class="wms-cat-backdrop" id="wms-cat-backdrop">BBALL</div>
  <div class="wms-cat-inner">
    <div>
      <div class="wms-cat-eyebrow">WMS · 클래스</div>
      <h1 class="wms-cat-h" id="wms-cat-title">농구</h1>
    </div>
    <div class="wms-cat-tagline" id="wms-cat-tagline">
      처음 공을 잡는 순간부터<br>팀의 일원이 되기까지
    </div>
  </div>
</section>

<!-- ══ 레벨 여정 ══ -->
<section id="wms-cat-journey">
  <div class="wms-journey-inner">
    <div class="wms-journey-lbl">나의 농구 여정</div>
    <div class="wms-steps" id="wms-steps">
      <!-- JS로 렌더 -->
    </div>
    <div class="wms-step-detail" id="wms-step-detail">
      <span class="wms-step-badge" id="wms-detail-badge">PLAY ON</span>
      <div>
        <div class="wms-step-detail-name" id="wms-detail-name">첫 수업 필수</div>
        <div class="wms-step-detail-desc" id="wms-detail-desc">농구가 처음이라면 여기서 시작해요. 룰도 장비도 없이 — 코트에 서는 것만으로 충분해요.</div>
      </div>
    </div>
  </div>
</section>

<!-- ══ 클래스 목록 헤더 (쇼핑 섹션 바로 위) ══ -->
<section id="wms-cat-list-header">
  <div class="wms-list-inner">
    <div class="wms-list-h">클래스 일정</div>
    <div class="wms-sort">
      <button class="wms-sort-btn on">전체</button>
      <button class="wms-sort-btn">이번 달</button>
      <button class="wms-sort-btn">다음 달</button>
    </div>
  </div>
</section>

<!--
  ↓ 여기에 아임웹 쇼핑 기획전 섹션 유지
-->

<script>
(function() {
  /* ── 종목별 설정 ── 이 부분만 종목마다 수정 */
  var SPORT = {
    name: '농구',
    backdrop: 'BBALL',
    tagline: '처음 공을 잡는 순간부터<br>팀의 일원이 되기까지',
    journeyLabel: '나의 농구 여정',
    steps: [
      { code: 'PO', name: 'PLAY ON', sub: '첫 수업 필수', desc: '농구가 처음이라면 여기서 시작해요. 룰도 장비도 없이 — 코트에 서는 것만으로 충분해요.' },
      { code: 'RK', name: '루키즈',   sub: '기초 입문',   desc: '드리블·패스·슛 기초 동작을 배우는 단계. 농구를 처음 배우고 싶은 분이라면 여기서 시작해요.' },
      { code: 'BR', name: '브릿지',   sub: '기초→실전',   desc: '루키즈를 수료하고 실전 기술로 넘어가는 단계. 기초와 실전 사이의 연결고리예요.' },
      { code: 'BA', name: '볼러스',   sub: '실전 기술',   desc: '기본기를 갖추고 게임에서 쓰는 실전 기술을 배우는 단계. 본격적인 농구가 시작돼요.' },
      { code: 'SY', name: '시너지',   sub: '팀 전술',     desc: '팀 움직임과 전술 중심. 함께 뛰는 농구의 진짜 재미를 경험하는 단계예요.' }
    ]
  };

  /* 히어로 내용 설정 */
  var titleEl = document.getElementById('wms-cat-title');
  var backdropEl = document.getElementById('wms-cat-backdrop');
  var taglineEl = document.getElementById('wms-cat-tagline');
  if (titleEl) titleEl.textContent = SPORT.name;
  if (backdropEl) backdropEl.textContent = SPORT.backdrop;
  if (taglineEl) taglineEl.innerHTML = SPORT.tagline;

  /* 스텝 렌더 */
  var stepsEl = document.getElementById('wms-steps');
  if (stepsEl) {
    stepsEl.innerHTML = SPORT.steps.map(function(s, i) {
      return '<div class="wms-step' + (i === 0 ? ' on' : '') + '" data-i="' + i + '">' +
        '<div class="wms-step-dot">' + s.code + '</div>' +
        '<div class="wms-step-name">' + s.name + '</div>' +
        '<div class="wms-step-sub">' + s.sub + '</div>' +
        '</div>';
    }).join('');

    stepsEl.addEventListener('click', function(e) {
      var step = e.target.closest('.wms-step');
      if (!step) return;
      var i = parseInt(step.dataset.i);
      document.querySelectorAll('.wms-step').forEach(function(s) { s.classList.remove('on'); });
      step.classList.add('on');
      var s = SPORT.steps[i];
      document.getElementById('wms-detail-badge').textContent = s.name;
      document.getElementById('wms-detail-name').textContent = s.sub;
      document.getElementById('wms-detail-desc').textContent = s.desc;
    });
  }

  /* 정렬 버튼 */
  document.querySelectorAll('.wms-sort-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.wms-sort-btn').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
    });
  });
})();
</script>
