<!-- ================================================================
  WMS 클래스 페이지 — 하단 코드 위젯
  쇼핑 기획전 섹션 바로 아래에 배치
================================================================ -->

<style>
#wms-class-bottom,
#wms-class-bottom *,
#wms-class-bottom *::before,
#wms-class-bottom *::after {
  box-sizing: border-box;
}

#wms-class-bottom {
  --wms-red: #67A8FF;
  --wms-bg: #F8F6F2;
  --wms-bg2: rgba(255,255,255,.72);
  margin: 0;
  background: transparent;
  color: #1F2127;
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  line-height: 1.5;
  word-break: keep-all;
}

#wms-class-bottom a {
  color: inherit;
  text-decoration: none;
}

#wms-class-bottom .wms-rec-container {
  width: min(100%, 1080px);
  margin: 0 auto;
  padding-left: clamp(20px, 4vw, 48px);
  padding-right: clamp(20px, 4vw, 48px);
}

#wms-class-bottom .wms-rec-grid2 > * {
  min-width: 0;
}

#wms-class-bottom #wms-class-recommend {
  background: var(--wms-bg);
  padding: 72px 0;
  border-top: .5px solid rgba(31,33,39,.07);
}

#wms-class-bottom .wms-rec-eyebrow2 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 24px;
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(31,33,39,.22);
}

#wms-class-bottom .wms-rec-eyebrow2::before {
  content: '';
  display: block;
  width: 18px;
  height: .5px;
  background: var(--wms-red);
}

#wms-class-bottom .wms-rec-grid2 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

#wms-class-bottom .wms-rec-card2 {
  display: block;
  min-height: 100%;
  padding: 26px 22px;
  border: .5px solid rgba(31,33,39,.08);
  border-radius: 14px;
  background: var(--wms-bg2);
  color: inherit;
  cursor: pointer;
  transition: border-color .2s, transform .2s;
}

#wms-class-bottom .wms-rec-card2:hover {
  border-color: rgba(103,168,255,.3);
  transform: translateY(-2px);
}

#wms-class-bottom .wms-rec-type {
  margin: 0 0 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .08em;
  color: rgba(103,168,255,.68);
}

#wms-class-bottom .wms-rec-name {
  margin: 0 0 9px;
  font-size: 34px;
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -.05em;
  color: #1F2127;
}

#wms-class-bottom .wms-rec-name-latin {
  font-family: 'DM Serif Display', Georgia, serif;
  letter-spacing: -.02em;
}

#wms-class-bottom .wms-rec-body {
  margin: 0 0 14px;
  font-size: 13px;
  line-height: 1.75;
  color: rgba(31,33,39,.36);
}

#wms-class-bottom .wms-rec-arrow {
  font-size: 12px;
  font-weight: 600;
  color: rgba(103,168,255,.7);
}

#wms-class-bottom .wms-rv {
  opacity: 0;
  transform: translateY(16px);
  transition:
    opacity .8s cubic-bezier(.16,1,.3,1),
    transform .8s cubic-bezier(.16,1,.3,1);
}

#wms-class-bottom .wms-rv.in {
  opacity: 1;
  transform: none;
}

#wms-class-bottom .wms-rd1 { transition-delay: .08s; }
#wms-class-bottom .wms-rd2 { transition-delay: .16s; }

@media (max-width: 1024px) {
  #wms-class-bottom .wms-rec-grid2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 640px) {
  #wms-class-bottom #wms-class-recommend {
    padding: 56px 0;
  }

  #wms-class-bottom .wms-rec-grid2 {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  #wms-class-bottom .wms-rec-name {
    font-size: 26px;
  }
}
</style>

<div id="wms-class-bottom">
  <section id="wms-class-recommend">
    <div class="wms-rec-container">
      <div class="wms-rec-eyebrow2 wms-rv">어디서 시작할까요?</div>
      <div class="wms-rec-grid2">
        <a href="/class" class="wms-rec-card2 wms-rv">
          <div class="wms-rec-type">처음이라면</div>
          <div class="wms-rec-name wms-rec-name-latin">PLAY ON</div>
          <div class="wms-rec-body">룰도 장비도 없이 그냥 오면 돼요. 운동이 처음인 사람도 부담 없이 참여 가능해요.</div>
          <div class="wms-rec-arrow">바로가기 →</div>
        </a>
        <a href="/class" class="wms-rec-card2 wms-rv wms-rd1">
          <div class="wms-rec-type">함께 뛰고 싶다면</div>
          <div class="wms-rec-name">팀 스포츠</div>
          <div class="wms-rec-body">혼자 하는 운동이 지루해졌다면, 함께할수록 더 재밌는 팀 스포츠를 배워보세요.</div>
          <div class="wms-rec-arrow">바로가기 →</div>
        </a>
        <a href="/class" class="wms-rec-card2 wms-rv wms-rd2">
          <div class="wms-rec-type">가볍게 경험</div>
          <div class="wms-rec-name">원데이 클래스</div>
          <div class="wms-rec-body">새로운 스포츠를 경험해보고 싶다면, 꾸준한 참여가 어려워도 괜찮아요.</div>
          <div class="wms-rec-arrow">바로가기 →</div>
        </a>
      </div>
    </div>
  </section>
</div>

<script>
(function() {
  var root = document.getElementById('wms-class-bottom');
  if (!root) return;

  var targets = root.querySelectorAll('.wms-rv');
  if ('IntersectionObserver' in window) {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) entry.target.classList.add('in');
      });
    }, { threshold: 0.08 });
    targets.forEach(function(el) { obs.observe(el); });
  } else {
    targets.forEach(function(el) { el.classList.add('in'); });
  }
})();
</script>
