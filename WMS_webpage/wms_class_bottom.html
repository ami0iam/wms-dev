<!-- ================================================================
  WMS 클래스 페이지 — 하단 코드 위젯
  쇼핑 기획전 섹션 바로 아래에 배치
================================================================ -->

<style>
/* ── 추천 카드 (하단 위젯 전용) ── */
#wms-class-recommend {
  background: #080808;
  padding: 72px 0;
  border-top: .5px solid rgba(255,255,255,.07);
  font-family: 'Pretendard', -apple-system, sans-serif;
}
#wms-class-recommend *, #wms-class-recommend *::before, #wms-class-recommend *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}
.wms-rec-container {
  max-width: 1080px; margin: 0 auto; padding: 0 48px;
}
.wms-rec-eyebrow2 {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: rgba(255,255,255,.22); margin-bottom: 24px;
  display: flex; align-items: center; gap: 10px;
}
.wms-rec-eyebrow2::before {
  content: ''; display: block; width: 18px; height: .5px; background: #c4284a;
}
.wms-rec-grid2 {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.wms-rec-card2 {
  background: #111; border: .5px solid rgba(255,255,255,.08);
  border-radius: 14px; padding: 26px 22px;
  cursor: pointer; transition: border-color .2s, transform .2s;
  display: block; color: inherit; text-decoration: none;
}
.wms-rec-card2:hover { border-color: rgba(196,40,74,.3); transform: translateY(-2px); }
.wms-rec-type {
  font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(196,40,74,.65); margin-bottom: 10px;
}
.wms-rec-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 19px; color: #fff; margin-bottom: 9px; line-height: 1.2;
}
.wms-rec-body {
  font-size: 12px; color: rgba(255,255,255,.32); line-height: 1.7; margin-bottom: 14px;
}
.wms-rec-arrow { font-size: 12px; color: rgba(196,40,74,.65); font-weight: 500; }

.wms-rv { opacity: 0; transform: translateY(16px); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
.wms-rv.in { opacity: 1; transform: none; }
.wms-rd1{transition-delay:.08s} .wms-rd2{transition-delay:.16s}

@media (max-width: 768px) {
  .wms-rec-container { padding: 0 24px; }
  #wms-class-recommend { padding: 56px 0; }
  .wms-rec-grid2 { grid-template-columns: 1fr; gap: 10px; }
}
@media (min-width: 480px) and (max-width: 768px) {
  .wms-rec-grid2 { grid-template-columns: 1fr 1fr; }
}
</style>

<section id="wms-class-recommend">
  <div class="wms-rec-container">
    <div class="wms-rec-eyebrow2 wms-rv">어디서 시작할까요?</div>
    <div class="wms-rec-grid2">
      <a href="/class" class="wms-rec-card2 wms-rv">
        <div class="wms-rec-type">처음이라면</div>
        <div class="wms-rec-name">PLAY ON</div>
        <div class="wms-rec-body">룰도 장비도 없이 — 그냥 오면 돼요. 운동이 처음인 사람도 부담 없이 참여 가능해요.</div>
        <div class="wms-rec-arrow">바로가기 →</div>
      </a>
      <a href="/class" class="wms-rec-card2 wms-rv wms-rd1">
        <div class="wms-rec-type">함께 뛰고 싶다면</div>
        <div class="wms-rec-name">팀 스포츠</div>
        <div class="wms-rec-body">혼자서 하는 운동이 지루해졌나요? 함께하면 더 재밌는 팀 스포츠를 배워보세요.</div>
        <div class="wms-rec-arrow">바로가기 →</div>
      </a>
      <a href="/class" class="wms-rec-card2 wms-rv wms-rd2">
        <div class="wms-rec-type">가볍게 경험</div>
        <div class="wms-rec-name">원데이 클래스</div>
        <div class="wms-rec-body">새로운 스포츠를 경험해보고 싶다면. 꾸준한 참여가 어려워도 괜찮아요.</div>
        <div class="wms-rec-arrow">바로가기 →</div>
      </a>
    </div>
  </div>
</section>

<script>
(function() {
  var obs = new IntersectionObserver(function(es) {
    es.forEach(function(e) { if(e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.08 });
  document.querySelectorAll('#wms-class-recommend .wms-rv').forEach(function(el) { obs.observe(el); });
})();
</script>
